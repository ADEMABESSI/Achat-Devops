services:
  mysqldb:
    image: mysql:5.7
    container_name: mysqldb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: achat
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10          # ← augmenter les tentatives
      start_period: 40s    # ← laisser le temps à MySQL de démarrer

  app-achat:
    image: achat:1.0.0
    container_name: app-achat
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysqldb:
        condition: service_healthy   # ← attendre que MySQL soit healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/achat?createDat
