version: "3.8"

services:

  mysqldb:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: achat_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-achat:
    image: ${DOCKERHUB_USER}/achat:${IMAGE_TAG:-1.0.0}
    restart: on-failure
    depends_on:
      mysqldb:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8082}:${APP_PORT:-8082}"
    environment:
      SPRING_APPLICATION_JSON: >
        {
          "spring.datasource.url"             : "jdbc:mysql://mysqldb:3306/achat_db?createDatabaseIfNotExist=true",
          "spring.datasource.username"        : "root",
          "spring.datasource.password"        : "",
          "spring.jpa.hibernate.ddl-auto"     : "update",
          "server.port"                       : "${APP_PORT:-8082}"
        }
    stdin_open: true
    tty: true

volumes:
  db_data:
